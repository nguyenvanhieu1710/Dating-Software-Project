version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: dating_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dating_software
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dating_password_2024
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
      - ./database/backups:/backups
    networks:
      - dating_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dating_software"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: dating_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - dating_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # pgAdmin for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dating_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@datingapp.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json
    networks:
      - dating_network
    depends_on:
      postgres:
        condition: service_healthy

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dating_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      HOST: 0.0.0.0
      
      # Database Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: dating_software
      DB_USER: postgres
      DB_PASSWORD: dating_password_2024
      DB_URL: postgresql://postgres:dating_password_2024@postgres:5432/dating_software
      
      # JWT Configuration
      JWT_SECRET: your_super_secret_jwt_key_here_make_it_long_and_random_2024
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: your_refresh_token_secret_here_2024
      JWT_REFRESH_EXPIRES_IN: 30d
      
      # Redis Configuration
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: 
      REDIS_DB: 0
      
      # Socket.IO Configuration
      SOCKET_CORS_ORIGIN: http://localhost:3000
      SOCKET_PING_TIMEOUT: 60000
      SOCKET_PING_INTERVAL: 25000
      SOCKET_MAX_HTTP_BUFFER_SIZE: 1e6
      
      # File Upload Configuration
      UPLOAD_MAX_SIZE: 10485760
      UPLOAD_ALLOWED_TYPES: image/jpeg,image/png,image/gif,video/mp4,video/avi
      UPLOAD_PATH: ./uploads
      UPLOAD_TEMP_PATH: ./uploads/temp
      
      # Security Configuration
      BCRYPT_ROUNDS: 12
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      CORS_ORIGIN: http://localhost:3000
      CORS_CREDENTIALS: true
      
      # Logging Configuration
      LOG_LEVEL: info
      LOG_FILE: ./logs/app.log
      LOG_MAX_SIZE: 20m
      LOG_MAX_FILES: 14
      
      # Cache Configuration
      CACHE_TTL: 3600
      CACHE_CHECK_PERIOD: 600
      CACHE_MAX_KEYS: 1000
      
      # Message Configuration
      MESSAGE_MAX_LENGTH: 1000
      MESSAGE_RATE_LIMIT: 20
      MESSAGE_RATE_WINDOW: 60
      TYPING_TIMEOUT: 2000
      
      # Match Configuration
      MATCH_DISTANCE_RADIUS: 50
      MATCH_AGE_RANGE_MIN: 18
      MATCH_AGE_RANGE_MAX: 65
      MATCH_MAX_DAILY_LIKES: 50
      
      # Frontend URLs
      FRONTEND_URL: http://localhost:3000
      MOBILE_APP_URL: exp://localhost:19000
      ADMIN_FRONTEND_URL: http://localhost:3001
      
      # Development Tools
      DEBUG: socket.io:*,app:*
      NODEMON_IGNORE: uploads/*,logs/*,node_modules/*
      NODEMON_DELAY: 1000
      
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - .:/app
      - /app/node_modules
    networks:
      - dating_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: MailHog for Email Testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: dating_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - dating_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  dating_network:
    driver: bridge
